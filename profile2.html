<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>KangJooHyuk</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}

:root{
  --c1:#00ffe7;
  --c2:#ff2d78;
  --c3:#ffe600;
  --bg:#06060e;
}

body{
  background:var(--bg);
  color:#fff;
  font-family:'Courier New',monospace;
  min-height:100vh;
  overflow-x:hidden;
}

/* ── 파티클 캔버스 ── */
#cv{
  position:fixed;inset:0;
  z-index:0;
  opacity:.55;
}

/* ── 스캔라인 오버레이 ── */
body::after{
  content:'';
  position:fixed;inset:0;
  background:repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,.13) 2px,
    rgba(0,0,0,.13) 4px
  );
  pointer-events:none;
  z-index:1;
}

/* ── 레이아웃 ── */
.page{
  position:relative;z-index:2;
  max-width:900px;
  margin:0 auto;
  padding:60px 28px 90px;
}

/* ── 상단 네임플레이트 ── */
.nameplate{
  text-align:center;
  margin-bottom:64px;
}

.glitch{
  font-size:clamp(42px,8vw,80px);
  font-weight:900;
  letter-spacing:6px;
  text-transform:uppercase;
  color:#fff;
  position:relative;
  display:inline-block;
  animation:glitch-base 4s infinite;
}
.glitch::before,.glitch::after{
  content:attr(data-text);
  position:absolute;
  top:0;left:0;
  width:100%;height:100%;
}
.glitch::before{
  color:var(--c1);
  animation:glitch-a 4s infinite;
  clip-path:polygon(0 20%,100% 20%,100% 40%,0 40%);
}
.glitch::after{
  color:var(--c2);
  animation:glitch-b 4s infinite;
  clip-path:polygon(0 60%,100% 60%,100% 80%,0 80%);
}

@keyframes glitch-base{
  0%,94%,100%{transform:translate(0);}
  95%{transform:translate(-2px,1px);}
  97%{transform:translate(2px,-1px);}
}
@keyframes glitch-a{
  0%,94%,100%{transform:translate(0);opacity:0;}
  95%{transform:translate(-4px,0);opacity:.9;}
  97%{transform:translate(4px,0);opacity:.9;}
}
@keyframes glitch-b{
  0%,94%,100%{transform:translate(0);opacity:0;}
  96%{transform:translate(4px,0);opacity:.9;}
  98%{transform:translate(-4px,0);opacity:.9;}
}

.subtitle{
  margin-top:14px;
  font-size:13px;
  letter-spacing:6px;
  color:var(--c1);
  text-transform:uppercase;
}
.subtitle .sep{color:var(--c2);margin:0 10px;}

/* ── 타이핑 텍스트 ── */
.typing-wrap{
  margin-top:18px;
  font-size:15px;
  color:rgba(255,255,255,.45);
  letter-spacing:1px;
}
#typed{color:var(--c1);}
.caret{
  display:inline-block;
  width:2px;height:16px;
  background:var(--c1);
  vertical-align:middle;
  margin-left:2px;
  animation:caretBlink .7s step-end infinite;
}
@keyframes caretBlink{0%,100%{opacity:1}50%{opacity:0}}

/* ── 그리드 ── */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  grid-template-rows:auto auto;
  gap:16px;
}
@media(max-width:600px){.grid{grid-template-columns:1fr;}}

/* ── 패널 ── */
.panel{
  position:relative;
  background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.08);
  border-radius:4px;
  padding:28px;
  overflow:hidden;
  transition:border-color .3s,transform .3s;
}
.panel:hover{
  border-color:var(--c1);
  transform:translateY(-3px);
}
/* 코너 장식 */
.panel::before,.panel::after{
  content:'';
  position:absolute;
  width:14px;height:14px;
  border-color:var(--c1);
  border-style:solid;
}
.panel::before{top:8px;left:8px;border-width:2px 0 0 2px;}
.panel::after {bottom:8px;right:8px;border-width:0 2px 2px 0;}

.panel.span2{grid-column:1/-1;}

.p-label{
  font-size:9px;
  letter-spacing:4px;
  color:var(--c2);
  text-transform:uppercase;
  margin-bottom:20px;
  display:flex;align-items:center;gap:10px;
}
.p-label::before{
  content:'//';
  color:rgba(255,255,255,.2);
}

/* ── 스킬 태그 ── */
.skills{display:flex;flex-wrap:wrap;gap:10px;}
.sk{
  padding:6px 14px;
  border:1px solid;
  border-radius:2px;
  font-size:12px;
  letter-spacing:2px;
  text-transform:uppercase;
  cursor:default;
  transition:all .2s;
  position:relative;
  overflow:hidden;
}
.sk::after{
  content:'';
  position:absolute;inset:0;
  background:currentColor;
  opacity:0;
  transition:opacity .2s;
}
.sk:hover::after{opacity:.08;}
.sk:hover{transform:scale(1.04);}

.sk.c1{border-color:var(--c1);color:var(--c1);}
.sk.c2{border-color:var(--c2);color:var(--c2);}
.sk.c3{border-color:var(--c3);color:var(--c3);}

/* ── 숙련도 바 (사이버 스타일) ── */
.bar-row{margin-bottom:16px;}
.bar-row:last-child{margin-bottom:0;}
.bar-head{
  display:flex;justify-content:space-between;
  font-size:11px;letter-spacing:2px;
  color:rgba(255,255,255,.5);
  margin-bottom:6px;
  text-transform:uppercase;
}
.bar-head .pct{color:var(--c1);}
.bar-track{
  height:4px;
  background:rgba(255,255,255,.06);
  position:relative;
  border-radius:0;
}
.bar-track::before{
  content:'';
  position:absolute;inset:0;
  border:1px solid rgba(255,255,255,.06);
}
.bar-fill{
  height:100%;
  width:0;
  background:linear-gradient(90deg,var(--c1),var(--c2));
  transition:width 1.4s cubic-bezier(.4,0,.2,1);
  box-shadow:0 0 8px var(--c1);
  position:relative;
}
.bar-fill::after{
  content:'';
  position:absolute;right:0;top:-3px;
  width:2px;height:10px;
  background:#fff;
  box-shadow:0 0 6px var(--c1);
}

/* ── 프로필 패널 ── */
.profile-grid{
  display:grid;
  grid-template-columns:auto 1fr;
  gap:20px;
  align-items:center;
}
.avatar-box{
  width:80px;height:80px;
  border:1px solid var(--c1);
  border-radius:2px;
  display:flex;align-items:center;justify-content:center;
  font-size:36px;
  position:relative;
  box-shadow:0 0 20px rgba(0,255,231,.15),inset 0 0 20px rgba(0,255,231,.05);
}
.avatar-box::before{
  content:'';
  position:absolute;
  inset:3px;
  border:1px solid rgba(0,255,231,.2);
  border-radius:2px;
}
.info-row{display:flex;align-items:baseline;gap:10px;margin-bottom:8px;}
.info-row:last-child{margin-bottom:0;}
.info-key{
  font-size:9px;letter-spacing:2px;
  color:rgba(255,255,255,.3);
  text-transform:uppercase;width:52px;flex-shrink:0;
}
.info-val{font-size:14px;color:#fff;letter-spacing:1px;}

/* ── 상태 표시 ── */
.status{
  display:inline-flex;align-items:center;gap:8px;
  font-size:11px;letter-spacing:2px;
  color:var(--c1);text-transform:uppercase;
  margin-top:16px;
}
.dot{
  width:7px;height:7px;
  border-radius:50%;
  background:var(--c1);
  box-shadow:0 0 8px var(--c1);
  animation:pulse 1.5s ease infinite;
}
@keyframes pulse{
  0%,100%{opacity:1;transform:scale(1);}
  50%{opacity:.4;transform:scale(.7);}
}

/* ── 푸터 ── */
.footer{
  margin-top:44px;
  text-align:center;
  font-size:10px;
  letter-spacing:4px;
  color:rgba(255,255,255,.15);
  text-transform:uppercase;
}
.footer em{color:var(--c2);font-style:normal;}

/* ── 입장 애니메이션 ── */
.panel{
  opacity:0;
  transform:translateY(16px);
  animation:panelIn .6s ease forwards;
}
.panel:nth-child(1){animation-delay:.1s;}
.panel:nth-child(2){animation-delay:.2s;}
.panel:nth-child(3){animation-delay:.3s;}
.panel:nth-child(4){animation-delay:.4s;}
@keyframes panelIn{
  to{opacity:1;transform:translateY(0);}
}
</style>
</head>
<body>

<canvas id="cv"></canvas>

<div class="page">

  <!-- 네임플레이트 -->
  <div class="nameplate">
    <div class="glitch" data-text="KANGJHYUK">KANGJHYUK</div>
    <div class="subtitle">
      Web Programmer
      <span class="sep">/</span>
      AI Enthusiast
    </div>
    <div class="typing-wrap">$ <span id="typed"></span><span class="caret"></span></div>
  </div>

  <!-- 그리드 -->
  <div class="grid">

    <!-- 프로필 -->
    <div class="panel">
      <div class="p-label">identity</div>
      <div class="profile-grid">
        <div class="avatar-box">👨‍💻</div>
        <div>
          <div class="info-row">
            <span class="info-key">name</span>
            <span class="info-val">KangJooHyuk</span>
          </div>
          <div class="info-row">
            <span class="info-key">role</span>
            <span class="info-val">Web Programmer</span>
          </div>
          <div class="info-row">
            <span class="info-key">bio</span>
            <span class="info-val" style="font-size:12px;color:rgba(255,255,255,.5);">코딩을 좋아하는 웹 프로그래머</span>
          </div>
        </div>
      </div>
      <div class="status"><div class="dot"></div>available for projects</div>
    </div>

    <!-- 스킬 -->
    <div class="panel">
      <div class="p-label">tech stack</div>
      <div class="skills">
        <span class="sk c1">⚛ React</span>
        <span class="sk c2">🐍 Python</span>
        <span class="sk c3">✨ AI</span>
        <span class="sk c1">🤖 ChatGPT</span>
        <span class="sk c2">⚙ C</span>
      </div>
    </div>

    <!-- 숙련도 -->
    <div class="panel span2" id="bars-panel">
      <div class="p-label">proficiency index</div>
      <div class="bar-row">
        <div class="bar-head"><span>React</span><span class="pct">82%</span></div>
        <div class="bar-track"><div class="bar-fill" data-w="82"></div></div>
      </div>
      <div class="bar-row">
        <div class="bar-head"><span>Python</span><span class="pct">78%</span></div>
        <div class="bar-track"><div class="bar-fill" data-w="78"></div></div>
      </div>
      <div class="bar-row">
        <div class="bar-head"><span>AI / LLM</span><span class="pct">75%</span></div>
        <div class="bar-track"><div class="bar-fill" data-w="75"></div></div>
      </div>
      <div class="bar-row">
        <div class="bar-head"><span>C Language</span><span class="pct">60%</span></div>
        <div class="bar-track"><div class="bar-fill" data-w="60"></div></div>
      </div>
    </div>

  </div>

  <div class="footer">
    sys://portfolio/2025 &nbsp;·&nbsp; designed by <em>KangJooHyuk</em>
  </div>
</div>

<script>
// ── 파티클 ──────────────────────────────────────────────────
const canvas = document.getElementById('cv');
const ctx = canvas.getContext('2d');
let W, H, particles = [], connections = [];

function resize(){
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

const COLORS = ['#00ffe7','#ff2d78','#ffe600'];

class Particle {
  constructor(){this.reset(true);}
  reset(init){
    this.x  = Math.random()*W;
    this.y  = init ? Math.random()*H : (Math.random()<.5 ? -8 : H+8);
    this.vx = (Math.random()-.5)*.4;
    this.vy = (Math.random()-.5)*.4;
    this.r  = Math.random()*1.8+.4;
    this.c  = COLORS[Math.floor(Math.random()*COLORS.length)];
    this.a  = Math.random()*.7+.3;
  }
  update(){
    this.x+=this.vx; this.y+=this.vy;
    if(this.x<-20||this.x>W+20||this.y<-20||this.y>H+20) this.reset(false);
  }
  draw(){
    ctx.beginPath();
    ctx.arc(this.x,this.y,this.r,0,Math.PI*2);
    ctx.fillStyle=this.c;
    ctx.globalAlpha=this.a;
    ctx.fill();
    ctx.globalAlpha=1;
  }
}

for(let i=0;i<110;i++) particles.push(new Particle());

function drawConnections(){
  const MAX=120;
  for(let i=0;i<particles.length;i++){
    for(let j=i+1;j<particles.length;j++){
      const dx=particles[i].x-particles[j].x;
      const dy=particles[i].y-particles[j].y;
      const d=Math.sqrt(dx*dx+dy*dy);
      if(d<MAX){
        ctx.beginPath();
        ctx.moveTo(particles[i].x,particles[i].y);
        ctx.lineTo(particles[j].x,particles[j].y);
        const a=(1-d/MAX)*.18;
        ctx.strokeStyle=`rgba(0,255,231,${a})`;
        ctx.lineWidth=.6;
        ctx.stroke();
      }
    }
  }
}

function loop(){
  ctx.clearRect(0,0,W,H);
  drawConnections();
  particles.forEach(p=>{p.update();p.draw();});
  requestAnimationFrame(loop);
}
loop();

// ── 타이핑 ──────────────────────────────────────────────────
const lines = [
  'console.log("Hello, World!");',
  'git commit -m "keep building"',
  'python train.py --model gpt',
  'npm run dev  # let\'s go',
  'while(true) { learn(); }',
];
let li=0, ci=0, deleting=false, pause=0;
const el = document.getElementById('typed');

function type(){
  const line = lines[li];
  if(pause>0){pause--;setTimeout(type,30);return;}
  if(!deleting){
    el.textContent = line.slice(0,++ci);
    if(ci===line.length){deleting=true;pause=60;}
  } else {
    el.textContent = line.slice(0,--ci);
    if(ci===0){deleting=false;li=(li+1)%lines.length;pause=20;}
  }
  setTimeout(type, deleting ? 22 : 55);
}
setTimeout(type, 800);

// ── 숙련도 바 ──────────────────────────────────────────────
const obs = new IntersectionObserver(entries=>{
  entries.forEach(e=>{
    if(e.isIntersecting){
      document.querySelectorAll('.bar-fill').forEach(b=>{
        b.style.width=b.dataset.w+'%';
      });
      obs.disconnect();
    }
  });
},{threshold:.3});
obs.observe(document.getElementById('bars-panel'));
</script>
</body>
</html>
