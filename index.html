<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KakaoTalk Web</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/reset.css" />
  <link rel="stylesheet" href="css/login.css" />
</head>
<body>
  <div class="login-wrap">
    <div class="login-box">
      <div class="login-logo">
        <img src="assets/icons/kakao-logo.svg" alt="KakaoTalk" width="64" height="64" />
        <h1>카카오톡 웹</h1>
        <p>PC 카카오톡과 동일한 채팅 경험을</p>
      </div>

      <button class="btn-google" id="btnGoogle">
        <svg width="20" height="20" viewBox="0 0 48 48" fill="none">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        </svg>
        Google 계정으로 로그인
      </button>

      <div class="login-divider"><span>또는</span></div>

      <div class="login-email-form">
        <input type="email" id="inputEmail" placeholder="이메일 주소" autocomplete="email" />
        <input type="password" id="inputPassword" placeholder="비밀번호" autocomplete="current-password" />
        <button class="btn-login" id="btnEmailLogin">로그인</button>
        <button class="btn-signup" id="btnEmailSignup">회원가입</button>
      </div>

      <div class="login-error" id="loginError"></div>
    </div>
  </div>

  <script type="module" src="js/firebase-config.js"></script>
  <script type="module" src="js/auth.js"></script>
</body>
</html>
