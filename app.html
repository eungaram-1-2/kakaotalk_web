<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KakaoTalk Web</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/reset.css" />
  <link rel="stylesheet" href="css/app.css" />
</head>
<body>

<!-- 로딩 -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
</div>

<!-- 앱 -->
<div id="app">

  <!-- ── 사이드바 ── -->
  <nav class="sidebar">
    <div class="sidebar-profile" id="sidebarProfile" title="내 프로필">
      <span id="sidebarInitial">?</span>
    </div>

    <div class="sidebar-tabs">
      <!-- 친구 -->
      <button class="sidebar-tab active" data-tab="friends" title="친구">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
          <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
      </button>
      <!-- 채팅 -->
      <button class="sidebar-tab" data-tab="chats" title="채팅">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
      </button>
    </div>

    <div class="sidebar-bottom">
      <button class="sidebar-tab-settings" data-tab="settings" title="설정">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </div>
  </nav>

  <!-- ── 리스트 패널 ── -->
  <div class="list-panel">

    <!-- 친구 탭 뷰 -->
    <div class="tab-view active" id="tabFriends">
      <div class="list-panel-header">
        <span class="list-panel-title">친구</span>
        <div class="list-panel-actions">
          <button class="icon-btn" id="btnAddFriend" title="친구 추가">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
              <circle cx="8.5" cy="7" r="4"/>
              <line x1="20" y1="8" x2="20" y2="14"/>
              <line x1="23" y1="11" x2="17" y2="11"/>
            </svg>
          </button>
        </div>
      </div>
      <div class="list-scroll">
        <!-- 내 프로필 -->
        <div class="my-profile" id="myProfile">
          <div class="my-profile-avatar" id="myProfileAvatar"><span id="myInitial">?</span></div>
          <div class="my-profile-info">
            <div class="my-profile-name" id="myProfileName">로딩 중...</div>
            <div class="my-profile-status" id="myProfileStatus">상태메시지를 입력하세요</div>
          </div>
        </div>
        <div class="list-section-header">친구 <span id="friendCount">0</span></div>
        <div id="friendList"></div>
      </div>
    </div>

    <!-- 채팅 탭 뷰 -->
    <div class="tab-view" id="tabChats">
      <div class="list-panel-header">
        <span class="list-panel-title">채팅</span>
        <div class="list-panel-actions">
          <button class="icon-btn" id="btnNewChat" title="새 채팅">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
              <line x1="12" y1="8" x2="12" y2="14"/>
              <line x1="9" y1="11" x2="15" y2="11"/>
            </svg>
          </button>
        </div>
      </div>
      <div class="list-search">
        <input type="text" id="chatSearch" placeholder="채팅방 검색" />
      </div>
      <div class="list-scroll" id="chatList"></div>
    </div>

    <!-- 설정 탭 뷰 -->
    <div class="tab-view" id="tabSettings">
      <div class="settings-header">설정</div>
      <div class="settings-avatar-wrap">
        <div class="settings-avatar" id="settingsAvatar">
          <span id="settingsInitial">?</span>
          <div class="settings-avatar-edit">변경</div>
          <input type="file" id="avatarFileInput" accept="image/*" style="display:none" />
        </div>
      </div>
      <div class="settings-section">
        <div class="settings-row">
          <div class="settings-row-label">이름</div>
          <div class="settings-row-value" id="settingsName">-</div>
          <button class="icon-btn" id="btnEditName">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px">
              <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
              <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
            </svg>
          </button>
        </div>
        <div class="settings-row">
          <div class="settings-row-label">상태메시지</div>
          <div class="settings-row-value" id="settingsStatus">-</div>
          <button class="icon-btn" id="btnEditStatus">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px">
              <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
              <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
            </svg>
          </button>
        </div>
        <div class="settings-row">
          <div class="settings-row-label">이메일</div>
          <div class="settings-row-value" id="settingsEmail">-</div>
        </div>
      </div>
      <button class="btn-logout" id="btnLogout">로그아웃</button>
    </div>

  </div><!-- /list-panel -->

  <!-- ── 채팅 패널 ── -->
  <div class="chat-panel" id="chatPanel">
    <!-- 채팅 선택 전 빈 상태 -->
    <div class="chat-empty" id="chatEmpty">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
      <p>대화를 선택하거나 새 채팅을 시작하세요</p>
    </div>

    <!-- 채팅창 (채팅 선택 후) -->
    <div id="chatWindow" style="display:none; flex-direction:column; flex:1; overflow:hidden;">
      <div class="chat-header">
        <div class="chat-header-name" id="chatHeaderName"></div>
        <div class="chat-header-count" id="chatHeaderCount"></div>
        <div class="list-panel-actions">
          <button class="icon-btn" id="btnInviteChat" title="대화상대 초대">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
              <circle cx="8.5" cy="7" r="4"/>
              <line x1="20" y1="8" x2="20" y2="14"/>
              <line x1="23" y1="11" x2="17" y2="11"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="chat-messages" id="chatMessages"></div>

      <div class="chat-input-wrap">
        <div class="chat-input-actions">
          <label class="chat-tool-btn" for="imgFileInput" title="이미지 전송">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
              <circle cx="8.5" cy="8.5" r="1.5"/>
              <polyline points="21 15 16 10 5 21"/>
            </svg>
            <input type="file" id="imgFileInput" accept="image/*" style="display:none" />
          </label>
        </div>
        <textarea class="chat-input" id="chatInput" placeholder="메시지를 입력하세요" rows="1"></textarea>
        <button class="btn-send" id="btnSend" title="전송">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

</div><!-- /app -->

<!-- ── 친구 추가 모달 ── -->
<div class="modal-overlay hidden" id="modalAddFriend">
  <div class="modal">
    <h2>친구 추가</h2>
    <input type="email" id="addFriendEmail" placeholder="상대방 이메일 주소" />
    <div class="modal-error" id="addFriendError"></div>
    <div class="modal-actions">
      <button class="modal-btn secondary" id="btnCancelAddFriend">취소</button>
      <button class="modal-btn primary" id="btnConfirmAddFriend">추가</button>
    </div>
  </div>
</div>

<!-- ── 이름 수정 모달 ── -->
<div class="modal-overlay hidden" id="modalEditName">
  <div class="modal">
    <h2>이름 변경</h2>
    <input type="text" id="editNameInput" placeholder="새 이름" maxlength="20" />
    <div class="modal-actions">
      <button class="modal-btn secondary" id="btnCancelEditName">취소</button>
      <button class="modal-btn primary" id="btnConfirmEditName">저장</button>
    </div>
  </div>
</div>

<!-- ── 상태메시지 수정 모달 ── -->
<div class="modal-overlay hidden" id="modalEditStatus">
  <div class="modal">
    <h2>상태메시지 변경</h2>
    <input type="text" id="editStatusInput" placeholder="상태메시지" maxlength="60" />
    <div class="modal-actions">
      <button class="modal-btn secondary" id="btnCancelEditStatus">취소</button>
      <button class="modal-btn primary" id="btnConfirmEditStatus">저장</button>
    </div>
  </div>
</div>

<!-- ── 새 채팅 모달 (친구 선택) ── -->
<div class="modal-overlay hidden" id="modalNewChat">
  <div class="modal">
    <h2>새 채팅</h2>
    <input type="text" id="newChatSearch" placeholder="친구 이름 검색" />
    <div id="newChatFriendList" style="max-height:200px;overflow-y:auto;margin:8px 0;"></div>
    <div class="modal-actions">
      <button class="modal-btn secondary" id="btnCancelNewChat">취소</button>
      <button class="modal-btn primary" id="btnConfirmNewChat">시작</button>
    </div>
  </div>
</div>

<!-- ── 대화상대 초대 모달 ── -->
<div class="modal-overlay hidden" id="modalInviteChat">
  <div class="modal">
    <h2>대화상대 초대</h2>
    <input type="text" id="inviteSearch" placeholder="친구 이름 검색" />
    <div id="inviteFriendList" style="max-height:200px;overflow-y:auto;margin:8px 0;"></div>
    <div class="modal-actions">
      <button class="modal-btn secondary" id="btnCancelInvite">취소</button>
      <button class="modal-btn primary" id="btnConfirmInvite">초대</button>
    </div>
  </div>
</div>

<!-- ── 이미지 뷰어 ── -->
<div class="img-viewer hidden" id="imgViewer">
  <img id="imgViewerSrc" src="" alt="이미지" />
</div>

<script type="module" src="js/firebase-config.js"></script>
<script type="module" src="js/ui.js"></script>
</body>
</html>
